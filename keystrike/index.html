<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEYSTRIKE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
    }

    #gameCanvas {
      display: block;
      border: 1px solid #0a0a1f;
      /* CRT subtle curvature */
      box-shadow:
        0 0 40px rgba(0, 255, 200, 0.05),
        0 0 100px rgba(0, 255, 200, 0.02),
        inset 0 0 60px rgba(0, 0, 0, 0.3);
    }

    /* Prevent text selection */
    * {
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  
  <script type="module">
    import { Game } from './js/game/Game.js';

    const canvas = document.getElementById('gameCanvas');
    const LOGICAL_WIDTH = 900;
    const LOGICAL_HEIGHT = 500;
    
    // HiDPI / Retina fix: scale canvas for sharp text
    function setupCanvas() {
      const dpr = window.devicePixelRatio || 1;
      
      // Calculate CSS size to fit viewport
      const ratio = LOGICAL_WIDTH / LOGICAL_HEIGHT;
      let w = window.innerWidth;
      let h = window.innerHeight;
      
      if (w / h > ratio) {
        w = h * ratio;
      } else {
        h = w / ratio;
      }
      
      // Set CSS display size
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;
      
      // Set actual canvas resolution (scaled by DPR for sharp rendering)
      canvas.width = LOGICAL_WIDTH * dpr;
      canvas.height = LOGICAL_HEIGHT * dpr;
      
      // Scale context so we can draw in logical pixels
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      
      return { dpr, cssWidth: w, cssHeight: h };
    }
    
    const displayInfo = setupCanvas();
    window.addEventListener('resize', () => {
      setupCanvas();
    });

    // Start game
    const game = new Game(canvas, LOGICAL_WIDTH, LOGICAL_HEIGHT);
    game.start();
  </script>
</body>
</html>
