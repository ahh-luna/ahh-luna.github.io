<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEYSTRIKE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
    }

    #gameCanvas {
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Prevent text selection */
    * {
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  
  <script type="module">
    import { Game } from './js/game/Game.js';

    const canvas = document.getElementById('gameCanvas');
    
    // HiDPI / Retina fix + fullscreen
    function setupCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const w = window.innerWidth;
      const h = window.innerHeight;
      
      // Canvas fills entire viewport
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      
      // Set backing store resolution for sharp text
      canvas.width = Math.round(w * dpr);
      canvas.height = Math.round(h * dpr);
      
      // Reset and set transform (don't compound on resize!)
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      
      return { dpr, width: w, height: h };
    }
    
    let info = setupCanvas();
    
    window.addEventListener('resize', () => {
      info = setupCanvas();
      if (window._game) {
        window._game.width = info.width;
        window._game.height = info.height;
      }
    });

    // Start game with actual viewport dimensions
    const game = new Game(canvas, info.width, info.height);
    window._game = game;
    game.start();
  </script>
</body>
</html>
